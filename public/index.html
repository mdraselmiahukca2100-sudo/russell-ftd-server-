<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RUSSELL FTD</title>
<style>
  :root{
    --green:#00a884; --green-dark:#008069;
    --bg:#f0f2f5; --panel:#ffffff; --chat-bg:#efeae2;
    --bubble-out:#d9fdd3; --bubble-in:#ffffff;
    --text:#111b21; --text-2:#667781; --border:#e9edef;
    --tick-read:#53bdeb; --danger:#ea0038;
  }
  body.dark{
    --bg:#111b21; --panel:#202c33; --chat-bg:#0b141a;
    --bubble-out:#005c4b; --bubble-in:#202c33;
    --text:#e9edef; --text-2:#8696a0; --border:#2a3942;
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
  #app{max-width:480px;margin:0 auto;height:100%;background:var(--panel);display:flex;flex-direction:column;position:relative;box-shadow:0 0 20px rgba(0,0,0,.15)}
  .hidden{display:none !important}

  /* Login */
  #loginScreen{position:absolute;inset:0;background:linear-gradient(180deg,var(--green-dark) 0 220px,var(--bg) 220px);display:flex;flex-direction:column;align-items:center;padding:40px 24px;z-index:100;overflow-y:auto}
  .logo{width:84px;height:84px;border-radius:22px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:44px;font-weight:800;color:var(--green-dark);box-shadow:0 6px 20px rgba(0,0,0,.25);margin-bottom:12px}
  #loginScreen h1{color:#fff;font-size:24px;letter-spacing:.5px;margin-bottom:26px}
  .card{background:var(--panel);border-radius:16px;padding:22px;width:100%;max-width:340px;box-shadow:0 4px 18px rgba(0,0,0,.12)}
  .card h2{font-size:17px;margin-bottom:14px}
  .card input{width:100%;border:1px solid var(--border);border-radius:9px;padding:12px;font-size:15px;margin-bottom:11px;outline:none;background:var(--bg);color:var(--text)}
  .card input:focus{border-color:var(--green)}
  .big-btn{width:100%;background:var(--green);color:#fff;border:none;border-radius:9px;padding:13px;font-size:15px;font-weight:700;cursor:pointer}
  .link-btn{background:none;border:none;color:var(--green-dark);font-size:14px;font-weight:600;cursor:pointer;margin-top:14px;width:100%;text-align:center}
  body.dark .link-btn{color:var(--green)}
  .err{color:var(--danger);font-size:13.5px;margin-bottom:10px;min-height:17px}
  .hint{font-size:12px;color:var(--text-2);margin-top:16px;text-align:center;line-height:1.5}

  /* Header/tabs */
  .topbar{background:var(--green-dark);color:#fff;padding:14px 16px 8px;flex-shrink:0}
  body.dark .topbar{background:var(--panel);border-bottom:1px solid var(--border)}
  .topbar-row{display:flex;align-items:center;justify-content:space-between}
  .brand{font-size:20px;font-weight:700}
  .me-name{font-size:12px;opacity:.85}
  .icon-btn{background:none;border:none;color:inherit;cursor:pointer;font-size:17px;padding:4px}
  .tabs{display:flex;margin-top:10px}
  .tab{flex:1;text-align:center;padding:10px 0;font-size:13px;font-weight:600;color:rgba(255,255,255,.65);cursor:pointer;border-bottom:3px solid transparent;text-transform:uppercase}
  body.dark .tab{color:var(--text-2)}
  .tab.active{color:#fff;border-bottom-color:#fff}
  body.dark .tab.active{color:var(--green);border-bottom-color:var(--green)}

  .page{flex:1;overflow-y:auto;display:none}
  .page.active{display:block}
  .row{display:flex;align-items:center;gap:14px;padding:11px 16px;cursor:pointer;border-bottom:1px solid var(--border)}
  .row:active{background:var(--bg)}
  .avatar{width:48px;height:48px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:18px}
  .row-main{flex:1;min-width:0}
  .row-top{display:flex;justify-content:space-between;align-items:baseline}
  .row-name{font-size:16px;font-weight:500}
  .row-time{font-size:12px;color:var(--text-2)}
  .row-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:2px}
  .row-preview{font-size:14px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .unread-badge{background:var(--green);color:#fff;border-radius:12px;min-width:20px;height:20px;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 6px;margin-left:8px}
  .empty{padding:44px 24px;text-align:center;color:var(--text-2);font-size:14px;line-height:1.7}
  .fab{position:absolute;right:18px;bottom:24px;width:56px;height:56px;border-radius:16px;background:var(--green);color:#fff;border:none;font-size:22px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.3);z-index:5}
  .section-label{padding:14px 16px 6px;font-size:13px;color:var(--text-2);font-weight:600}
  .status-ring{padding:2.5px;border-radius:50%;border:2.5px solid var(--green)}
  .status-ring.seen{border-color:var(--text-2)}

  /* Chat view */
  #chatView{position:absolute;inset:0;background:var(--chat-bg);display:none;flex-direction:column;z-index:20}
  #chatView.open{display:flex}
  .chat-head{background:var(--green-dark);color:#fff;display:flex;align-items:center;gap:10px;padding:10px 12px;flex-shrink:0}
  body.dark .chat-head{background:var(--panel);border-bottom:1px solid var(--border)}
  .chat-head .avatar{width:38px;height:38px;font-size:15px}
  .chat-head-info{flex:1;min-width:0}
  .chat-head-name{font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .chat-head-sub{font-size:12px;opacity:.85;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #msgArea{flex:1;overflow-y:auto;padding:12px 10px 6px;display:flex;flex-direction:column;gap:3px}
  .msg{max-width:78%;padding:6px 9px 7px;border-radius:9px;font-size:14.5px;line-height:1.35;position:relative;box-shadow:0 1px 1px rgba(0,0,0,.1);word-wrap:break-word}
  .msg.in{align-self:flex-start;background:var(--bubble-in);border-top-left-radius:0}
  .msg.out{align-self:flex-end;background:var(--bubble-out);border-top-right-radius:0}
  .msg .sender{font-size:12.5px;font-weight:700;margin-bottom:2px}
  .msg img{max-width:100%;border-radius:7px;display:block;margin-bottom:3px}
  .meta{float:right;margin:6px -2px -4px 8px;font-size:11px;color:var(--text-2);display:flex;gap:3px;align-items:center}
  .ticks{letter-spacing:-3px;font-size:12px}
  .ticks.read{color:var(--tick-read)}
  #typingBar{font-size:12.5px;color:var(--green);padding:2px 16px 6px;min-height:20px;font-style:italic}
  .composer{display:flex;align-items:flex-end;gap:8px;padding:0 10px 8px;flex-shrink:0}
  .composer-box{flex:1;background:var(--panel);border-radius:24px;display:flex;align-items:center;padding:4px 8px}
  .composer-box input[type=text]{flex:1;border:none;outline:none;background:transparent;font-size:15px;padding:9px 6px;color:var(--text)}
  .send-btn{width:46px;height:46px;border-radius:50%;background:var(--green);border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0}
  #emojiBar{display:none;gap:4px;flex-wrap:wrap;padding:8px 12px;background:var(--panel);border-top:1px solid var(--border)}
  #emojiBar.open{display:flex}
  #emojiBar button{background:none;border:none;font-size:24px;cursor:pointer;padding:4px}

  /* Status viewer */
  #statusViewer{position:absolute;inset:0;z-index:40;display:none;flex-direction:column;color:#fff;background:#111}
  #statusViewer.open{display:flex}
  .sv-progress{display:flex;gap:4px;padding:10px 12px 0}
  .sv-progress div{flex:1;height:3px;background:rgba(255,255,255,.35);border-radius:2px;overflow:hidden}
  .sv-progress div i{display:block;height:100%;width:0;background:#fff}
  .sv-head{display:flex;align-items:center;gap:10px;padding:12px}
  .sv-head .avatar{width:38px;height:38px;font-size:15px}
  .sv-body{flex:1;display:flex;align-items:center;justify-content:center;padding:30px;text-align:center;font-size:26px;font-weight:600;line-height:1.4;cursor:pointer;overflow:hidden}
  .sv-body img{max-width:100%;max-height:100%;border-radius:8px;object-fit:contain}

  /* Calls */
  #callScreen{position:absolute;inset:0;z-index:50;display:none;flex-direction:column;align-items:center;justify-content:space-between;background:linear-gradient(180deg,#0b3d36,#051f1b);color:#fff;padding:60px 20px 50px;text-align:center}
  #callScreen.open{display:flex}
  .call-avatar{width:110px;height:110px;border-radius:50%;font-size:42px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;margin:0 auto 18px}
  .call-name{font-size:26px;font-weight:600}
  .call-state{font-size:15px;opacity:.85;margin-top:8px}
  .call-actions{display:flex;gap:26px;align-items:center;z-index:2}
  .call-btn{width:60px;height:60px;border-radius:50%;border:none;font-size:22px;cursor:pointer;background:rgba(255,255,255,.15);color:#fff}
  .call-btn.end{background:var(--danger);width:68px;height:68px}
  .call-btn.accept{background:#00a884;width:68px;height:68px}
  .call-btn.active-toggle{background:#fff;color:#111}
  #remoteVideo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;background:#000;display:none}
  #localVideo{position:absolute;top:70px;right:16px;width:96px;height:130px;border-radius:10px;object-fit:cover;z-index:2;background:#222;border:1px solid rgba(255,255,255,.3);display:none}
  #callScreen.video-active #remoteVideo{display:block}
  #callScreen.video-active #localVideo{display:block}
  #callScreen.video-active .call-info{position:relative;z-index:2;text-shadow:0 1px 6px rgba(0,0,0,.7)}
  #incomingScreen{position:absolute;inset:0;z-index:55;display:none;flex-direction:column;align-items:center;justify-content:space-between;background:linear-gradient(180deg,#123a33,#07211c);color:#fff;padding:70px 20px 60px;text-align:center}
  #incomingScreen.open{display:flex}

  /* Modal */
  #modal{position:absolute;inset:0;z-index:60;background:rgba(0,0,0,.45);display:none;align-items:center;justify-content:center;padding:24px}
  #modal.open{display:flex}
  .modal-card{background:var(--panel);border-radius:14px;padding:20px;width:100%;max-width:340px;max-height:80%;overflow-y:auto}
  .modal-card h3{font-size:17px;margin-bottom:14px}
  .modal-card input,.modal-card textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:10px;font-size:15px;background:var(--bg);color:var(--text);outline:none;margin-bottom:12px;font-family:inherit;resize:none}
  .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:8px}
  .btn{border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:600;cursor:pointer}
  .btn.primary{background:var(--green);color:#fff}
  .btn.ghost{background:transparent;color:var(--text-2)}
  .member-pick{display:flex;align-items:center;gap:10px;padding:8px 2px;cursor:pointer;font-size:15px;border-bottom:1px solid var(--border)}
  .member-pick input{width:auto;margin:0}

  .toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(17,27,33,.92);color:#fff;padding:9px 18px;border-radius:20px;font-size:13.5px;z-index:70;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
  .toast.show{opacity:1}
  .offline-bar{background:#f5c33b;color:#333;text-align:center;font-size:12.5px;padding:5px;display:none}
  .offline-bar.show{display:block}
</style>
</head>
<body>
<div id="app">

  <!-- Login -->
  <div id="loginScreen">
    <div class="logo">R</div>
    <h1>RUSSELL FTD</h1>
    <div class="card">
      <h2 id="authTitle">Log in</h2>
      <div class="err" id="authErr"></div>
      <input type="text" id="serverUrl" placeholder="Server address (e.g. https://your-app.onrender.com)">
      <input type="text" id="authUser" placeholder="Username" autocapitalize="none" autocomplete="username">
      <input type="text" id="authName" placeholder="Display name (shown to others)" class="hidden">
      <input type="password" id="authPass" placeholder="Password" autocomplete="current-password">
      <button class="big-btn" id="authBtn">Log in</button>
      <button class="link-btn" id="authSwitch">New here? Create an account</button>
    </div>
    <div class="hint">Real accounts, real messages, real calls.</div>
  </div>

  <!-- Main -->
  <div class="topbar" id="topbar">
    <div class="topbar-row">
      <div>
        <div class="brand">RUSSELL FTD</div>
        <div class="me-name" id="meName"></div>
      </div>
      <div>
        <button class="icon-btn" id="darkToggle" title="Dark mode">&#9789;</button>
        <button class="icon-btn" id="settingsBtn" title="Settings">&#9881;</button>
        <button class="icon-btn" id="logoutBtn" title="Log out" style="font-size:13px;font-weight:600">Log out</button>
      </div>
    </div>
    <div class="tabs">
      <div class="tab active" data-tab="chats">Chats</div>
      <div class="tab" data-tab="status">Status</div>
      <div class="tab" data-tab="contacts">Contacts</div>
    </div>
  </div>
  <div class="offline-bar" id="offlineBar">Connecting to server...</div>
  <div class="page active" id="page-chats"></div>
  <div class="page" id="page-status"></div>
  <div class="page" id="page-contacts"></div>
  <button class="fab" id="fab">&#128101;</button>

  <!-- Chat view -->
  <div id="chatView">
    <div class="chat-head">
      <button class="icon-btn" id="backBtn">&#8592;</button>
      <div class="avatar" id="chatAvatar"></div>
      <div class="chat-head-info">
        <div class="chat-head-name" id="chatName"></div>
        <div class="chat-head-sub" id="chatSub"></div>
      </div>
      <button class="icon-btn" id="videoCallBtn" title="Video call">&#128249;</button>
      <button class="icon-btn" id="voiceCallBtn" title="Voice call">&#128222;</button>
    </div>
    <div id="msgArea"></div>
    <div id="typingBar"></div>
    <div id="emojiBar"></div>
    <div class="composer">
      <div class="composer-box">
        <button class="icon-btn" id="emojiBtn" style="color:var(--text-2)">&#128578;</button>
        <input type="text" id="msgInput" placeholder="Message" autocomplete="off">
        <button class="icon-btn" id="attachBtn" style="color:var(--text-2)" title="Send photo">&#128206;</button>
      </div>
      <button class="send-btn" id="sendBtn">&#10148;</button>
    </div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
    <input type="file" id="statusFileInput" accept="image/*" style="display:none">
  </div>

  <!-- Status viewer -->
  <div id="statusViewer">
    <div class="sv-progress" id="svProgress"></div>
    <div class="sv-head">
      <button class="icon-btn" id="svClose">&#8592;</button>
      <div class="avatar" id="svAvatar"></div>
      <div>
        <div style="font-weight:600" id="svName"></div>
        <div style="font-size:12px;opacity:.8" id="svTime"></div>
      </div>
    </div>
    <div class="sv-body" id="svBody"></div>
  </div>

  <!-- Incoming call -->
  <div id="incomingScreen">
    <div>
      <div class="call-avatar" id="incAvatar"></div>
      <div class="call-name" id="incName"></div>
      <div class="call-state" id="incType">Incoming call...</div>
    </div>
    <div class="call-actions">
      <button class="call-btn end" id="declineBtn">&#10006;</button>
      <button class="call-btn accept" id="acceptBtn">&#128222;</button>
    </div>
  </div>

  <!-- Call screen -->
  <div id="callScreen">
    <video id="remoteVideo" autoplay playsinline></video>
    <video id="localVideo" autoplay playsinline muted></video>
    <audio id="remoteAudio" autoplay></audio>
    <div class="call-info">
      <div class="call-avatar" id="callAvatar"></div>
      <div class="call-name" id="callName"></div>
      <div class="call-state" id="callState">Calling...</div>
    </div>
    <div class="call-actions">
      <button class="call-btn" id="muteBtn" title="Mute">&#128263;</button>
      <button class="call-btn end" id="endCallBtn">&#128308;</button>
      <button class="call-btn" id="camBtn" title="Camera on/off">&#128249;</button>
    </div>
  </div>

  <div id="modal"><div class="modal-card" id="modalCard"></div></div>
  <div class="toast" id="toast"></div>
</div>

<script>
"use strict";
(function(){

  /* ---------- utils ---------- */
  function $(id){ return document.getElementById(id); }
  function el(tag, cls, text){
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (text !== undefined) e.textContent = text;
    return e;
  }
  var COLORS = ["#e91e63","#9c27b0","#3f51b5","#03a9f4","#009688","#ff9800","#795548","#607d8b","#f44336","#4caf50"];
  function colorFor(name){
    var h = 0;
    for (var i=0;i<name.length;i++) h = (h*31 + name.charCodeAt(i)) % 997;
    return COLORS[h % COLORS.length];
  }
  function initials(name){
    var p = String(name).trim().split(/\s+/);
    var s = (p[0]||"?").charAt(0);
    if (p.length > 1) s += p[p.length-1].charAt(0);
    return s.toUpperCase();
  }
  function fmtTime(ts){
    var d = new Date(ts), now = new Date();
    if (d.toDateString() === now.toDateString()){
      var h = d.getHours(), m = d.getMinutes();
      var ap = h >= 12 ? "PM" : "AM"; h = h % 12; if (!h) h = 12;
      return h + ":" + (m<10?"0":"") + m + " " + ap;
    }
    return (d.getMonth()+1) + "/" + d.getDate();
  }
  function toast(msg){
    var t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    clearTimeout(toast._t);
    toast._t = setTimeout(function(){ t.classList.remove("show"); }, 2400);
  }
  function store(key, val){
    try {
      if (val === null) localStorage.removeItem(key);
      else localStorage.setItem(key, val);
    } catch(e){}
  }
  function read(key){
    try { return localStorage.getItem(key); } catch(e){ return null; }
  }
  var EMOJIS = ["😀","😂","😍","😎","🤔","👍","🙏","🔥","❤️","🎉","😢","😮","💯","👏","🤝","🌙","☀️","⚽","🍕","☕"];

  /* ---------- state ---------- */
  var BASE = read("ftd_base") || (location.protocol.indexOf("http") === 0 ? location.origin : "");
  var TOKEN = read("ftd_token") || "";
  var ME = null;
  var chats = [], contacts = [], statusData = null;
  var activeChat = null, lastTs = 0, lastSignal = 0;
  var pollChatTimer = null, pollListTimer = null, pollSignalTimer = null;

  /* ---------- api ---------- */
  function api(method, path, body){
    var opts = { method: method, headers: {} };
    if (TOKEN) opts.headers["Authorization"] = "Bearer " + TOKEN;
    if (body){ opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
    return fetch(BASE + path, opts).then(function(r){
      return r.json().then(function(data){
        if (!r.ok) throw new Error(data.error || ("Error " + r.status));
        $("offlineBar").classList.remove("show");
        return data;
      });
    });
  }

  /* ---------- dark mode ---------- */
  if (read("ftd_dark") === "1") document.body.classList.add("dark");
  $("darkToggle").addEventListener("click", function(){
    document.body.classList.toggle("dark");
    store("ftd_dark", document.body.classList.contains("dark") ? "1" : null);
  });

  /* ---------- auth ---------- */
  var registerMode = false;
  $("serverUrl").value = BASE;
  $("authSwitch").addEventListener("click", function(){
    registerMode = !registerMode;
    $("authTitle").textContent = registerMode ? "Create account" : "Log in";
    $("authBtn").textContent = registerMode ? "Register" : "Log in";
    $("authSwitch").textContent = registerMode ? "Have an account? Log in" : "New here? Create an account";
    $("authName").classList.toggle("hidden", !registerMode);
    $("authErr").textContent = "";
  });
  $("authBtn").addEventListener("click", doAuth);
  $("authPass").addEventListener("keydown", function(e){ if (e.key === "Enter") doAuth(); });

  function doAuth(){
    var url = $("serverUrl").value.trim().replace(/\/+$/, "");
    if (url) BASE = url;
    if (!BASE){ $("authErr").textContent = "Enter the server address"; return; }
    store("ftd_base", BASE);
    var body = { username: $("authUser").value, password: $("authPass").value };
    if (registerMode) body.name = $("authName").value;
    $("authErr").textContent = "";
    $("authBtn").disabled = true;
    api("POST", registerMode ? "/api/register" : "/api/login", body)
      .then(function(d){
        TOKEN = d.token; ME = d.user;
        store("ftd_token", TOKEN);
        enterApp();
      })
      .catch(function(e){ $("authErr").textContent = e.message; })
      .then(function(){ $("authBtn").disabled = false; });
  }

  $("logoutBtn").addEventListener("click", function(){
    endCall(true);
    TOKEN = ""; ME = null;
    store("ftd_token", null);
    stopAllPolling();
    $("chatView").classList.remove("open");
    $("loginScreen").classList.remove("hidden");
  });

  function enterApp(){
    $("loginScreen").classList.add("hidden");
    $("meName").textContent = ME.name + " (@" + ME.username + ")";
    refreshChats(); refreshContacts(); refreshStatus();
    startPolling();
  }

  /* ---------- settings + account deletion ---------- */
  $("settingsBtn").addEventListener("click", function(){
    var card = $("modalCard");
    card.innerHTML = "";
    card.appendChild(el("h3", null, "Account"));
    var info = el("div", null, ME.name + " (@" + ME.username + ")");
    info.style.cssText = "font-size:15px;margin-bottom:18px";

  function loadMessages(){
    if (!activeChat) return Promise.resolve();
    var chatId = activeChat.id;
    return api("GET", "/api/messages?chatId=" + chatId + "&after=" + lastTs)
      .then(function(d){
        if (!activeChat || activeChat.id !== chatId) return;
        chatReads = d.reads || {};
        $("typingBar").textContent = d.typing && d.typing.length
          ? d.typing.join(", ") + (d.typing.length > 1 ? " are" : " is") + " typing..."
          : "";
        if (d.messages.length){
          var area = $("msgArea");
          var stick = area.scrollHeight - area.scrollTop - area.clientHeight < 80;
          d.messages.forEach(function(m){
            area.appendChild(msgEl(m));
            if (m.ts > lastTs) lastTs = m.ts;
          });
          if (stick || d.messages[d.messages.length-1].from === ME.id){
            area.scrollTop = area.scrollHeight;

        }
        updateTicks();
      })
      .catch(function(){ $("offlineBar").classList.add("show"); });

  function tickHtmlFor(ts){

    return allRead ? '<span class="ticks read">✓✓</span>' : '<span class="ticks">✓✓</span>';

  /* photos */
  function shrinkImage(file, max, cb){
    if (!/^image\//.test(file.type)){ toast("Please choose an image"); return; }
    var reader = new FileReader();
    reader.onload = function(ev){
      var im = new Image();
      im.onload = function(){
        var w = im.width, h = im.height;
        if (w > max || h > max){
          var k = Math.min(max/w, max/h);
          w = Math.round(w*k); h = Math.round(h*k);
        }
        var cv = document.createElement("canvas");
        cv.width = w; cv.height = h;
        cv.getContext("2d").drawImage(im, 0, 0, w, h);
        cb(cv.toDataURL("image/jpeg", 0.8));
      };
      im.onerror = function(){ toast("Could not read image"); };
      im.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  }

  /* ---------- REAL CALLS (WebRTC) ---------- */
  var pc = null, localStream = null, callPeer = null, callType = null;
  var callTimer = null, callSecs = 0, muted = false, camOff = false;
  var pendingOffer = null;
  var RTC_CONFIG = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

  function signal(to, type, data){
    return api("POST", "/api/signal", { to: to, type: type, data: data || null }).catch(function(){});
  }

  function getMedia(video){
    return navigator.mediaDevices.getUserMedia({ audio: true, video: video ? { facingMode: "user" } : false });
  }

  function setupPeer(peerId){
    pc = new RTCPeerConnection(RTC_CONFIG);
    pc.onicecandidate = function(e){
      if (e.candidate) signal(peerId, "ice", e.candidate);
    };
    pc.ontrack = function(e){
      var stream = e.streams[0];
      if (callType === "video"){
        $("remoteVideo").srcObject = stream;
      }
      $("remoteAudio").srcObject = stream;
      $("callState").textContent = "Connected";
      startCallTimer();
    };
    pc.onconnectionstatechange = function(){
      if (!pc) return;
      if (pc.connectionState === "failed" || pc.connectionState === "disconnected"){
        $("callState").textContent = "Connection lost";
        setTimeout(function(){ endCall(true); }, 1500);
      }
    };
    localStream.getTracks().forEach(function(t){ pc.addTrack(t, localStream); });
    if (callType === "video") $("localVideo").srcObject = localStream;
  }

  function showCallScreen(name){
    var av = $("callAvatar");
    av.textContent = initials(name);
    av.style.background = colorFor(name);
    $("callName").textContent = name;
    $("callState").textContent = "Calling...";
    $("callScreen").classList.toggle("video-active", callType === "video");
    $("callScreen").classList.add("open");
    muted = false; camOff = false;
    $("muteBtn").classList.remove("active-toggle");
    $("camBtn").classList.remove("active-toggle");
    $("camBtn").style.display = callType === "video" ? "" : "none";
  }
  function startCallTimer(){
    if (callTimer) return;
    callSecs = 0;
    callTimer = setInterval(function(){
      callSecs++;
      var mm = Math.floor(callSecs/60), ss = callSecs%60;
      $("callState").textContent = (mm<10?"0":"")+mm+":"+(ss<10?"0":"")+ss;
    }, 1000);
  }

  function startCall(type){
    if (!activeChat || activeChat.isGroup) return;
    if (pc){ toast("Already in a call"); return; }
    if (!window.RTCPeerConnection || !navigator.mediaDevices){
      toast("Calling not supported on this device/browser");
      return;
    }
    callType = type;
    callPeer = otherMemberId(activeChat);
    var peerName = activeChat.name;
    getMedia(type === "video").then(function(stream){
      localStream = stream;
      showCallScreen(peerName);
      setupPeer(callPeer);
      return pc.createOffer().then(function(offer){
        return pc.setLocalDescription(offer);
      }).then(function(){
        signal(callPeer, "call-offer", { sdp: pc.localDescription, callType: type, name: ME.name });
      });
    }).catch(function(e){
      toast("Microphone/camera permission needed");
      endCall(true);
    });
  }
  $("voiceCallBtn").addEventListener("click", function(){ startCall("voice"); });
  $("videoCallBtn").addEventListener("click", function(){ startCall("video"); });

  function endCall(silent){
    if (callPeer && !silent) signal(callPeer, "call-end", null);
    clearInterval(callTimer); callTimer = null;
    if (pc){ try { pc.close(); } catch(e){} pc = null; }
    if (localStream){
      localStream.getTracks().forEach(function(t){ t.stop(); });
      localStream = null;
    }
    $("remoteVideo").srcObject = null;
    $("localVideo").srcObject = null;
    $("remoteAudio").srcObject = null;
    $("callScreen").classList.remove("open");
    $("incomingScreen").classList.remove("open");
    callPeer = null; callType = null; pendingOffer = null;
  }
  $("endCallBtn").addEventListener("click", function(){ endCall(false); });
  $("declineBtn").addEventListener("click", function(){
    if (pendingOffer) signal(pendingOffer.from, "call-decline", null);
    $("incomingScreen").classList.remove("open");
    pendingOffer = null;
  });
  $("acceptBtn").addEventListener("click", function(){
    if (!pendingOffer) return;
    var offer = pendingOffer;
    pendingOffer = null;
    $("incomingScreen").classList.remove("open");
    callType = offer.data.callType;
    callPeer = offer.from;
    getMedia(callType === "video").then(function(stream){
      localStream = stream;
      showCallScreen(offer.fromName);
      setupPeer(callPeer);
      return pc.setRemoteDescription(new RTCSessionDescription(offer.data.sdp)).then(function(){
        return pc.createAnswer();
      }).then(function(answer){
        return pc.setLocalDescription(answer);
      }).then(function(){
        signal(callPeer, "call-answer", { sdp: pc.localDescription });
      });
    }).catch(function(e){
      toast("Microphone/camera permission needed");
      signal(offer.from, "call-decline", null);
      endCall(true);
    });
  });
  $("muteBtn").addEventListener("click", function(){
    muted = !muted;
    if (localStream) localStream.getAudioTracks().forEach(function(t){ t.enabled = !muted; });
    this.classList.toggle("active-toggle", muted);
  });
  $("camBtn").addEventListener("click", function(){
    camOff = !camOff;
    if (localStream) localStream.getVideoTracks().forEach(function(t){ t.enabled = !camOff; });
    this.classList.toggle("active-toggle", camOff);
  });

  function handleSignal(s){
    if (s.type === "call-offer"){
      if (pc || pendingOffer){
        signal(s.from, "call-decline", null);
        return;
      }
      pendingOffer = s;
      var av = $("incAvatar");
      av.textContent = initials(s.fromName);
      av.style.background = colorFor(s.fromName);
      $("incName").textContent = s.fromName;
      $("incType").textContent = "Incoming " + (s.data.callType === "video" ? "video" : "voice") + " call...";
      $("incomingScreen").classList.add("open");
      // auto-dismiss after 30s
      setTimeout(function(){
        if (pendingOffer && pendingOffer.id === s.id){
          $("incomingScreen").classList.remove("open");
          pendingOffer = null;
        }
      }, 30000);
    } else if (s.type === "call-answer"){
      if (pc && s.data && s.data.sdp){
        pc.setRemoteDescription(new RTCSessionDescription(s.data.sdp)).catch(function(){});
      }
    } else if (s.type === "ice"){
      if (pc && s.data){
        pc.addIceCandidate(new RTCIceCandidate(s.data)).catch(function(){});
      }
    } else if (s.type === "call-decline"){
      toast("Call declined");
      endCall(true);
    } else if (s.type === "call-end"){
      toast("Call ended");
      endCall(true);
    }
  }

  /* ---------- polling ---------- */
  function pollSignals(){
    if (!TOKEN) return;
    api("GET", "/api/signal?after=" + lastSignal).then(function(d){
      if (d.last > lastSignal && !d.signals.length) lastSignal = d.last;
      d.signals.forEach(function(s){
        if (s.id > lastSignal) lastSignal = s.id;
        handleSignal(s);
      });
    }).catch(function(){});
  }
  function startChatPolling(){
    stopChatPolling();
    pollChatTimer = setInterval(loadMessages, 2000);
  }
  function stopChatPolling(){ clearInterval(pollChatTimer); }
  function startPolling(){
    stopAllPolling();
    pollListTimer = setInterval(function(){
      if (!TOKEN) return;
      refreshChats();
      refreshContacts();
      if (currentTab === "status") refreshStatus();
    }, 4000);
    pollSignalTimer = setInterval(pollSignals, 1500);
  }
  function stopAllPolling(){
    clearInterval(pollListTimer);
    clearInterval(pollSignalTimer);
    stopChatPolling();
  }

  /* ---------- init ---------- */
  if (TOKEN && BASE){
    api("GET", "/api/me")
      .then(function(d){ ME = d.user; enterApp(); })
      .catch(function(){ TOKEN = ""; store("ftd_token", null); });
  }

})();
</script>
